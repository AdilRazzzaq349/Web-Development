<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
.skill-section{
    height: 100vh;
    background-color:#081b29;
}
.headings{
    width: 300px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    left: 37%;
    top: 30px;
    font-size: 33px;
}
.my{
    color: white;
}
.skills{
    color: lightskyblue;
    margin-left: 10px;
}
.main-skill-part{
    width: 50%;
    height: 60vh;
    position: relative;
    top: 15%;
    left: 300px;
    border: 2px solid lightskyblue;
    border-radius: 10px;
    padding-left: 5%;
    padding-top: 4%;
    padding-top: 45px;
}
.box{
    width: 90%;
    height: 40px;
    border: 2px solid lightskyblue;
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding-left: 5px;
}
.mb1{
    width: 90%;
    background-color: lightskyblue;
    height: 80%;
    border-radius: 5px;
    position: relative;
    right: 6.5%;
}
.mb2{
    width: 85%;
    background-color: lightskyblue;
    height: 80%;
    border-radius: 5px;
    position: relative;
    right: 6.5%;
}
.mb3{
    width: 30%;
    background-color: lightskyblue;
    height: 80%;
    border-radius: 5px;
    position: relative;
    right: 6.5%;
}
.mb4{
    width: 70%;
    background-color: lightskyblue;
    height: 80%;
    border-radius: 5px;
    position: relative;
    right: 6.5%;
}
.p0{
    color: white;
    font-size: 28px;
    position: relative;
    margin-left: 24%;
    top: 13%;
    font-weight: 500;
}
.main-skill-part p{
    color: white;
}
.box3 p{
    position: relative;
    left: 90%;
}
.box4 p{
    position: relative;
    left: 90%;
}
.box2 p{
    position: relative;
    left: 90%;
}
.box1 p{
    position: relative;
    left: 90%;
}
    </style>
</head>
<body>
    <div class="skill-section">
        <div class="headings">
            <h2 class="my">My</h2>
            <h2 class="skills">Skills</h2>
        </div>
        <p class="p0">Coding Skills</p>
        <div class="main-skill-part">
            <p class="p1">HTML</p>
            <div class="box1 box">
                <p>90%</p>
                <div class="mb1"></div>
            </div>
            <p class="p2">CSS</p>
            <div class="box2 box">
                <p>85%</p>
                <div class="mb2"></div>
            </div>
            <p class="p3">JAVASCRIPT</p>
            <div class="box3 box">
                <p>30%</p>
                <div class="mb3"></div>
            </div>
            <P class="p4">Python</P>
            <div class="box4 box">
                <p>70%</p>
                <div class="mb4"></div>
            </div>
        </div>
    </div>
</body>
</html>
