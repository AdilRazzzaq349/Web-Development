<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}
        .about-us-section{
    background-color:#081b29;
    height: 100vh;
}
.headings{
    width: 300px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    left: 37%;
    top: 30px;
}
.about{
    font-size: 46px;
    color: white;
}
.me{
    font-size: 46px;
    color: lightskyblue;
    margin-left: 8px;
}
.about-image{
    width: 150px;
    height: 150px;
    background-image: url("./about.jpg");
    border-radius: 50%;
    background-size: contain;
    border: 2px solid lightskyblue;
    position: relative;
    left: 43%;
    top: 70px;
}
.about-description{
    width: 50%;
    height: 200px;
    color: white;
    position: relative;
    margin-top: 130px;
    display: flex;
    left: 25%;
}
.skill2{
    font-size: 26px;
    color: white;
    position: relative;
    margin-left: 38%;
    top: 15%;
}
.readmore{
    position: relative;
    bottom: 16%;
    width: 120px;
    height: 40px;
    background-color: lightskyblue;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    font-weight: 600;
    border-radius: 10px;
    margin-left: 44%;
}
.readmore:hover{
    background-color: transparent;
    transition: .5s ease-in-out;
    border: 2px solid lightskyblue;
    color: lightskyblue;
}

    </style>
</head>
<body>
    <div class="about-us-section">
        <div class="headings">
            <h2 class="about">About</h2>
            <h2 class="me">Me</h2>
        </div>
        <div class="about-image"></div>
        <h2 class="skill2">Frontend Developer!</h2>
        <div class="about-description">
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Tempore perspiciatis ea nam, odio ad eos. Molestias illo maxime nobis dolorem earum? Fugiat nobis dolore et blanditiis ad deserunt hic! Quibusdam.Fugiat nobis dolore et</p>
        </div>
        <div class="readmore">Read More <i class="fa-solid fa-arrow-right"></i></div>
    </div>
</body>
</html>
